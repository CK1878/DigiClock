<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Routine Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- CONFIGURATION SCREEN -->
    <div id="setup-screen" class="panel-view">
        <div class="setup-card">
            <h2>⚙️ Advanced Routine Builder</h2>
            <p>Customise your day. Add, remove, or adjust time blocks for parties, weekend shifts, or routines.</p>
            
            <!-- Dynamic Container for Slots -->
            <div id="routine-list"></div>

            <button class="secondary-btn" onclick="addNewRoutineRow()">➕ Add Extra Routine Part</button>
            <button id="launch-btn" onclick="launchClock()">Display Clock 🚀</button>
        </div>
    </div>

    <!-- MAIN CLOCK SCREEN -->
    <div id="clock-screen" class="display-view hidden">
        <div id="dashboard-layout">
            
            <!-- Metadata Side Panel -->
            <div class="meta-data-block">
                <div id="date-display">--</div>
                <div id="digital-clock-12">00:00 AM</div>
                <div id="digital-clock-24">24h: 00:00</div>
            </div>

            <!-- Clock Core Frame -->
            <div class="clock-frame">
                <!-- Teaching visual segment layers go here dynamically -->
                <div id="learning-sectors-bg"></div>
                
                <div class="clock-face" id="face">
                    <div class="hand hour-hand" id="hour-hand"></div>
                    <div class="hand minute-hand" id="minute-hand"></div>
                    <div class="hand second-hand" id="second-hand"></div>
                    <div class="center-nut"></div>
                    
                    <div class="marker m12">12</div>
                    <div class="marker m3">3</div>
                    <div class="marker m6">6</div>
                    <div class="marker m9">9</div>
                </div>
            </div>

        </div>

        <div id="routine-banner">
            <h1 id="routine-text">--</h1>
        </div>
        
        <button id="back-to-settings" onclick="showSettings()">⚙️</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
